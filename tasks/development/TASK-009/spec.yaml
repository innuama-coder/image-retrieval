version: "2.0"
name: "TASK-009-e2e-fixture-release-gates"
repo:
  url: "https://github.com/innuama-coder/image-retrieval.git"
  branch: "main"
task_dir: "tasks/development/TASK-009"
executor: "claude"
deliverables:
  - path: "tests"
    verify: "cargo test --all"
  - path: "src"
  - path: "README.md"
execution:
  poll_interval_sec: 5
  idle_timeout_sec: 120
  max_duration_min: 60
  max_nudge_count: 10
  max_consecutive_escalate: 3
