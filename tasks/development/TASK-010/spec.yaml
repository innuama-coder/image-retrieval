version: "2.0"
name: "TASK-010-mvp-delivery-acceptance"
repo:
  url: "https://github.com/innuama-coder/image-retrieval.git"
  branch: "main"
task_dir: "tasks/development/TASK-010"
executor: "claude"
deliverables:
  - path: "tasks/development/acceptance-report.md"
    verify: "cargo fmt --all -- --check && cargo clippy --all-targets --all-features -- -D warnings && cargo test --all"
execution:
  poll_interval_sec: 5
  idle_timeout_sec: 120
  max_duration_min: 60
  max_nudge_count: 10
  max_consecutive_escalate: 3
