version: "2.0"
name: "TASK-007-image-retrieval-v1.1"
repo:
  url: "https://github.com/innuama-coder/image-retrieval.git"
  branch: "main"
task_dir: "tasks/development/v1.1/TASK-007"
executor: "claude"
deliverables:
  - path: "tasks/development/v1.1/acceptance-report.md"
    verify: 'p=tasks/development/v1.1/acceptance-report.md; test -s "$p" || exit 1; for s in verdict evidence SerpApi retrieval Qwen package real-service; do grep -qF "$s" "$p" || exit 1; done'
execution:
  poll_interval_sec: 5
  idle_timeout_sec: 120
  max_duration_min: 60
  max_nudge_count: 10
  max_consecutive_escalate: 3
